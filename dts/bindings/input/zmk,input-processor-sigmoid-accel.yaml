description: |
  Sigmoid acceleration input processor for Steam Deck-style trackpad feel.
  Slow movements remain precise, fast movements are amplified.

  The acceleration curve follows: scale = min_scale + (max_scale - min_scale) * sigmoid((velocity - threshold) * steepness)

  Example:
    &sigmoid_accel {
        compatible = "zmk,input-processor-sigmoid-accel";
        #input-processor-cells = <0>;
        min-scale = <100>;      // 1.0x at slow speeds (divided by 100)
        max-scale = <300>;      // 3.0x at fast speeds (divided by 100)
        threshold = <50>;       // velocity threshold for acceleration
        steepness = <10>;       // how sharp the transition is (divided by 100)
    };

compatible: "zmk,input-processor-sigmoid-accel"

include: base.yaml

properties:
  "#input-processor-cells":
    type: int
    required: true
    const: 0
    description: Must be zero - no parameters at binding time

  min-scale:
    type: int
    default: 100
    description: |
      Minimum scale factor (at slow speeds), divided by 100.
      100 = 1.0x, 150 = 1.5x, etc.

  max-scale:
    type: int
    default: 300
    description: |
      Maximum scale factor (at fast speeds), divided by 100.
      200 = 2.0x, 300 = 3.0x, etc.

  threshold:
    type: int
    default: 50
    description: |
      Velocity threshold where acceleration curve is centered.
      Lower = acceleration kicks in earlier.

  steepness:
    type: int
    default: 10
    description: |
      Steepness of the sigmoid curve, divided by 100.
      Higher = sharper transition between slow/fast modes.
      10 = 0.1 (gradual), 50 = 0.5 (moderate), 100 = 1.0 (sharp)
